<!DOCTYPE html>
<html>

<head>
    <title>Web Dev Quiz 🧠</title>
    <link rel="stylesheet" href="quiz.css" />
</head>

<body>

    <div class="quiz-container">

        <!-- HEADER -->
        <div class="quiz-header">
            <h1>Web Dev Quiz 🧠</h1>
            <p>Test your HTML, CSS & JavaScript knowledge!</p>
        </div>

        <!-- PROGRESS -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-text" id="progressText">Question 1 of 5</p>

        <!-- QUESTION -->
        <div class="question-box" id="questionBox">
            <h2 id="questionText">Question goes here</h2>
        </div>

        <!-- OPTIONS -->
        <div class="options-box" id="optionsBox">
            <!-- Options added by JS -->
        </div>

        <!-- FEEDBACK -->
        <p class="feedback" id="feedback"></p>

        <!-- NEXT BUTTON -->
        <button class="next-btn" id="nextBtn" style="display:none">
            Next Question ➡️
        </button>

        <!-- RESULT (hidden initially) -->
        <div class="result-box" id="resultBox" style="display:none">
            <h2>Quiz Complete! 🎉</h2>
            <p id="scoreText"></p>
            <p id="resultMessage"></p>
            <button class="restart-btn" id="restartBtn">
                Try Again 🔄
            </button>
        </div>

    </div>

    <script src="quiz.js"></script>
</body>

</html>
